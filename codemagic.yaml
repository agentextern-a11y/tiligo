workflows:
  tiligo_ios:
    name: Tiligo iOS Auto-Heal Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # VALIDATE PROJECT ROOT
      # =========================================================
      - name: Validate Project
        script: |
          set -e
          echo "Checking Flutter project..."

          test -f pubspec.yaml || (echo "Missing pubspec.yaml" && exit 1)

      # =========================================================
      # FLUTTER SETUP
      # =========================================================
      - name: Flutter Setup
        script: |
          set -e
          flutter clean
          flutter pub get

      # =========================================================
      # AUTO-HEAL iOS STRUCTURE (IMPORTANT FIX)
      # =========================================================
      - name: Ensure iOS Project Exists
        script: |
          set -e

          if [ ! -f ios/Podfile ]; then
            echo "Podfile missing → regenerating iOS platform..."
            rm -rf ios
            flutter create .
          fi

          if [ ! -d ios ]; then
            echo "iOS folder missing → creating..."
            flutter create .
          fi

      # =========================================================
      # COCOAPODS INSTALL (ROBUST)
      # =========================================================
      - name: Install CocoaPods
        script: |
          set -e

          if ! command -v pod >/dev/null 2>&1; then
            echo "Installing CocoaPods..."
            sudo gem install cocoapods --no-document
          fi

          pod --version

      # =========================================================
      # POD INSTALL (SAFE)
      # =========================================================
      - name: Install iOS Dependencies
        script: |
          set -e

          cd ios
          pod install --repo-update
          cd ..

      # =========================================================
      # TEST (NON-BLOCKING)
      # =========================================================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # ANALYSIS (NON-BLOCKING)
      # =========================================================
      - name: Static Analysis
        script: |
          set +e
          flutter analyze

      # =========================================================
      # BUILD IPA
      # =========================================================
      - name: Build iOS IPA
        script: |
          set -e

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
