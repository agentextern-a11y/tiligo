workflows:
  tiligo-production:
    name: Tiligo Production

    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable

      vars:
        BUNDLE_ID: com.base69d519273be8cf966434f77a.app

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.base69d519273be8cf966434f77a.app

    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Build Android
        script: flutter build appbundle --release

      - name: Build iOS
        script: flutter build ipa --release

    artifacts:
      - build/**/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
