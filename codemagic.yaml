workflows:

  ios_production:

    name: Tiligo iOS Production

    max_build_duration: 90

    environment:

      flutter: stable

      xcode: latest

      vars:

        BUNDLE_ID: "com.base69d519273be8cf966434f77a.app"

        APP_NAME: "TiliGo"

    cache:

      cache_paths:

        - ~/.pub-cache

        - ios/Pods

        - ~/.gradle

    scripts:

      - name: 🔧 Clean environment

        script: |

          flutter clean

          flutter pub get

      - name: 📦 Install iOS dependencies

        script: |

          cd ios

          pod install

          cd ..

      - name: 🧪 Run tests (non-blocking)

        script: |

          flutter test || true

      - name: 🏗 Build iOS (auto signing handled by Codemagic)

        script: |

          flutter build ipa --release

      - name: 🏷 Auto versioning

        script: |

          echo "Build number: $BUILD_NUMBER"

          cd ios

          agvtool new-version -all $BUILD_NUMBER || true

          cd ..

    artifacts:

      - build/ios/ipa/*.ipa

    publishing:

      app_store_connect:

        auth: integration

        submit_to_testflight: true

        beta_groups:

          - Internal Testers

        release_notes: |

          Automated Tiligo build via Codemagic CI/CD

    triggering:

      branch_patterns:

        - pattern: main

          include: true
