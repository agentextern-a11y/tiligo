workflows:
  tiligo_ios_fast:
    name: Tiligo iOS Fast Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ~/.cocoapods
        - ios/Pods
        - ios/.symlinks

    scripts:

      # =========================================================
      # LIGHTWEIGHT VALIDATION (FAST)
      # =========================================================
      - name: Validate Project
        script: |
          set -e
          test -f pubspec.yaml

      # =========================================================
      # FLUTTER DEPENDENCIES (OPTIMIZED)
      # =========================================================
      - name: Flutter Pub Get
        script: |
          set -e
          flutter pub get

      # =========================================================
      # SKIP CLEAN (IMPORTANT SPEED BOOST)
      # =========================================================
      - name: Skip Full Clean
        script: |
          echo "Skipping flutter clean for speed"

      # =========================================================
      # COCOAPODS (CACHED + NO REINSTALL IF POSSIBLE)
      # =========================================================
      - name: CocoaPods Install (Optimized)
        script: |
          set -e

          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi

          pod --version

      # =========================================================
      # POD INSTALL (ONLY IF NEEDED)
      # =========================================================
      - name: Install Pods (Incremental)
        script: |
          set -e

          cd ios

          if [ ! -d Pods ] || [ ! -f Podfile.lock ]; then
            echo "Fresh pod install required"
            pod install
          else
            echo "Using cached Pods"
          fi

          cd ..

      # =========================================================
      # FAST ANALYSIS (NON-BLOCKING)
      # =========================================================
      - name: Analyze (Non-blocking)
        script: |
          set +e
          flutter analyze

      # =========================================================
      # FAST TESTS (OPTIONAL)
      # =========================================================
      - name: Tests (Non-blocking)
        script: |
          set +e
          flutter test

      # =========================================================
      # FAST BUILD (OPTIMIZED)
      # =========================================================
      - name: Build IPA (Fast)
        script: |
          set -e

          flutter build ipa --release --no-tree-shake-icons

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
