workflows:
  tiligo_smart_pipeline:
    name: Tiligo CI/CD

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable
      xcode: latest

    scripts:

      - name: Detect project root
        script: |
          echo "Repo structure:"
          ls -R

      - name: Install dependencies
        script: |
          flutter pub get

      # ONLY RUN PODS IF ios folder exists
      - name: Install CocoaPods (safe check)
        script: |
          if [ -d "ios" ]; then
            cd ios
            pod install --repo-update
            cd ..
          else
            echo "No ios folder found - skipping CocoaPods"
          fi

      - name: Build iOS
        script: |
          if [ -d "ios" ]; then
            flutter build ipa --release
          else
            echo "ERROR: No iOS project detected"
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
