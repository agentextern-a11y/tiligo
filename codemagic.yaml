workflows:
  ios-app-store:
    name: TiliGo iOS App Store Build

    instance_type: mac_mini_m2

    max_build_duration: 120

    environment:
      xcode: latest
      cocoapods: default
      node: 20.0.0

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.tiligo.app"
        APP_STORE_APPLE_ID: "6771979690"

      groups:
        - app_store_credentials

    cache:
      cache_paths:
        - ~/.npm
        - ~/.cache/npm
        - ~/.cocoapods
        - ~/Library/Caches/CocoaPods
        - ios/App/Pods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install Pods (clean + deterministic)
        script: |
          cd ios/App
          pod deintegrate || true
          pod install --repo-update

      - name: iOS code signing setup
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

      email:
        recipients:
          - elgrandexx@icloud.com
        notify:
          success: true
          failure: true
