workflows:

  tiligo_ios_production:
    name: Tiligo iOS Production Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods

    scripts:

      # =====================================================
      # 1. VERIFY PROJECT (FAIL FAST)
      # =====================================================
      - name: Validate Flutter Project
        script: |
          set -e

          if [ ! -f pubspec.yaml ]; then
            echo "❌ ERROR: pubspec.yaml not found in repo root"
            exit 1
          fi

          echo "✅ Flutter project detected"

      # =====================================================
      # 2. INSTALL DEPENDENCIES
      # =====================================================
      - name: Install Flutter Dependencies
        script: |
          set -e

          flutter clean
          flutter pub get

      # =====================================================
      # 3. iOS SETUP (CLEAN & SAFE)
      # =====================================================
      - name: Install iOS Pods
        script: |
          set -e

          if [ ! -d ios ]; then
            echo "❌ ERROR: ios folder missing. Run 'flutter create .' locally and commit ios folder."
            exit 1
          fi

          cd ios
          pod install
          cd ..

      # =====================================================
      # 4. CODE QUALITY (NON-BLOCKING)
      # =====================================================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      # =====================================================
      # 5. BUILD IOS APP
      # =====================================================
      - name: Build iOS App
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
