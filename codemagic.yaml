workflows:

  tiligo_ios_autonomous:
    name: Tiligo iOS Autonomous Engine

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # 🚀 1. IOS PROJECT BOOTSTRAP (SELF-HEALING)
      # =========================================================
      - name: iOS Bootstrap Engine
        script: |
          set -e

          echo "🧠 iOS AUTONOMOUS BOOTSTRAP START"

          cd $CM_BUILD_DIR

          # Ensure Flutter project exists
          if [ ! -f pubspec.yaml ]; then
            echo "❌ No Flutter project found → creating iOS-only Flutter project..."
            flutter create . --platforms=ios
          fi

          # Ensure iOS folder exists
          if [ ! -d ios ]; then
            echo "⚠️ Missing ios/ → regenerating..."
            flutter create . --platforms=ios
          fi

          echo "📦 Installing Flutter dependencies..."
          flutter clean
          flutter pub get

          # Ensure Podfile exists
          if [ ! -f ios/Podfile ]; then
            echo "⚠️ Podfile missing → rebuilding iOS module..."
            rm -rf ios
            flutter create . --platforms=ios
          fi

          echo "🍫 CocoaPods install starting..."
          cd ios
          pod install
          cd ..

          echo "✅ iOS BOOTSTRAP COMPLETE"

      # =========================================================
      # 🧪 2. QUALITY CHECK (SAFE)
      # =========================================================
      - name: Code Quality
        script: |
          set +e
          flutter analyze
          flutter test

      # =========================================================
      # 🚀 3. BUILD IOS APP
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          echo "🚀 Building iOS App..."

          if [ "$CM_BRANCH" = "main" ]; then
            flutter build ipa --release
          else
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # 🔢 4. AUTO VERSIONING
      # =========================================================
      - name: Versioning
        script: |
          set +e

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

          echo "🔢 Version updated"

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
