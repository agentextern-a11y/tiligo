workflows:
  tiligo_ios:
    name: Tiligo iOS Production Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ~/.cocoapods
        - ios/Pods
        - ios/.symlinks

    scripts:

      # =========================
      # VALIDATION
      # =========================
      - name: Validate Project
        script: |
          set -e
          test -f pubspec.yaml
          test -d lib

      # =========================
      # FLUTTER DEPENDENCIES
      # =========================
      - name: Flutter Pub Get
        script: |
          set -e
          flutter pub get

      # =========================
      # COCOAPODS
      # =========================
      - name: Ensure CocoaPods
        script: |
          set -e

          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi

      # =========================
      # IOS POD INSTALL
      # =========================
      - name: Install Pods
        script: |
          set -e
          cd ios

          test -f Podfile

          pod install --repo-update
          cd ..

      # =========================
      # TESTS (NON-BLOCKING)
      # =========================
      - name: Tests
        script: |
          set +e
          flutter test

      # =========================
      # ANALYSIS (NON-BLOCKING)
      # =========================
      - name: Analyze
        script: |
          set +e
          flutter analyze

      # =========================
      # BUILD IPA
      # =========================
      - name: Build IPA
        script: |
          set -e
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
