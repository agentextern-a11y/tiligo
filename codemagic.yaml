workflows:
  ios-release:
    name: iOS Release

    instance_type: mac_mini_m2

    max_build_duration: 120

    integrations:
      app_store_connect: codemagic

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tiligo.app

      vars:
        BUNDLE_ID: "com.tiligo.app"
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/Library/Caches/CocoaPods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: CocoaPods install
        script: |
          cd ios && pod install

      - name: Flutter analyze
        script: |
          flutter analyze

      - name: Flutter test
        script: |
          flutter test

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com

      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
