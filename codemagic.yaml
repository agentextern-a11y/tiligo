workflows:

  tiligo_autonomous_engine:
    name: Tiligo CI/CD Pipeline (Production Ready)

    # REQUIRED: matches your created Codemagic integration
    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # PROJECT CHECK
      # =========================================================
      - name: Validate Flutter Project
        script: |
          set -e

          echo "Checking for Flutter project..."

          if [ ! -f "pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml not found in repo root"
            echo "Fix: Ensure Flutter project is at repository root OR adjust repo structure"
            exit 1
          fi

      # =========================================================
      # CLEAN + INSTALL
      # =========================================================
      - name: Clean & Install Dependencies
        script: |
          set -e

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

      # =========================================================
      # TESTS
      # =========================================================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # ANALYSIS
      # =========================================================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      # =========================================================
      # BUILD MODE
      # =========================================================
      - name: Build iOS App
        script: |
          set -e

          if [ "$CM_BRANCH" = "main" ]; then
            echo "Production build"
            flutter build ipa --release
          else
            echo "Development build"
            flutter build ios --debug --no-codesign
          fi

      # =========================================================
      # VERSIONING
      # =========================================================
      - name: Auto Versioning
        script: |
          set +e

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:

        # REQUIRED for your Codemagic integration setup
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
