workflows:

  tiligo_smart_pipeline:
    name: Tiligo Smart CI/CD

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

      vars:
        APP_STORE_CONNECT_KEY_ID: $APP_STORE_CONNECT_KEY_ID
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY

    cache:
      cache_paths:
        - ~/.pub-cache
        - ios/Pods
        - ~/.gradle

    scripts:

      # =========================
      # CLEAN + INSTALL
      # =========================
      - name: Clean & Install
        script: |
          set -e

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

      # =========================
      # TESTS (NON-BLOCKING)
      # =========================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================
      # ANALYZE (NON-BLOCKING)
      # =========================
      - name: Analyze Code
        script: |
          set +e
          flutter analyze

      # =========================
      # DETECT BUILD MODE
      # =========================
      - name: Detect Build Mode
        script: |
          set -e

          echo "Current branch: $CM_BRANCH"

          if [ "$CM_BRANCH" = "develop" ]; then
            echo "BUILD_MODE=dev" >> $CM_ENV

          elif [ "$CM_BRANCH" = "main" ]; then
            echo "BUILD_MODE=production" >> $CM_ENV

          elif [[ "$CM_BRANCH" == v* ]]; then
            echo "BUILD_MODE=release" >> $CM_ENV

          else
            echo "BUILD_MODE=dev" >> $CM_ENV
          fi

      # =========================
      # BUILD IOS
      # =========================
      - name: Build iOS IPA
        script: |
          set -e

          echo "Build mode: $BUILD_MODE"

          if [ "$BUILD_MODE" = "dev" ]; then
            flutter build ios --debug --no-codesign
          else
            flutter build ipa --release
          fi

      # =========================
      # AUTO VERSIONING
      # =========================
      - name: Auto Versioning
        script: |
          set +e

          echo "Build number: $BUILD_NUMBER"

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:

        auth:
          api_key: $APP_STORE_CONNECT_PRIVATE_KEY
          key_id: $APP_STORE_CONNECT_KEY_ID
          issuer_id: $APP_STORE_CONNECT_ISSUER_ID

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
