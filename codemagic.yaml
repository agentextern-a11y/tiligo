workflows:
  tiligo-production:
    name: Tiligo Auto Release

    instance_type: mac_mini_m2
    max_build_duration: 90

    integrations:
      app_store_connect: tiligo_asc

    environment:
      flutter: stable

      vars:
        BUNDLE_ID: com.base69d519273be8cf966434f77a.app

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ~/.gradle/wrapper
        - ~/Library/Caches/CocoaPods

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Get dependencies
        script: flutter pub get

      # Automatically fetch Apple signing assets using tiligo_asc
      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..

      # Auto build number (no manual versioning needed)
      - name: Set build number
        script: |
          echo "BUILD_NUMBER=$((BUILD_NUMBER + 1))"

      - name: Build Android (AAB)
        script: |
          flutter build appbundle --release \
            --build-number=$BUILD_NUMBER

      - name: Build iOS (IPA)
        script: |
          flutter build ipa --release \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/**/outputs/**/*.aab
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
