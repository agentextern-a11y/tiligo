workflows:
  tiligo_smart_pipeline:
    name: Tiligo Enterprise CI/CD Pipeline
    instance_type: mac_mini_m2
    
    # =========================================================
    # ROOT-LEVEL TRIGGERS
    # =========================================================
    triggering:
      events:
        - push
        - pull_request
        - tag
      branches:
        include:
          - main
          - develop
          - release/*
          - hotfix/*
        exclude:
          - docs/*
          - '*.md'
      tags:
        include:
          - v*
      cancel_previous_builds: true
    
    # =========================================================
    # ROOT-LEVEL INTEGRATIONS
    # =========================================================
    integrations:
      app_store_connect: tiligo_asc
      slack: tiligo_slack_webhook
    
    # =========================================================
    # ROOT-LEVEL SETTINGS
    # =========================================================
    max_build_duration: 120
    environment_variables:
      APP_ENV: production
      FLUTTER_ROOT: ~/development/flutter
    
    # =========================================================
    # CACHE CONFIGURATION
    # =========================================================
    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches
        - ios/Pods
        - build/ios/.symlinks
      clear_cache_on_branch_change: true
    
    # =========================================================
    # ENVIRONMENT
    # =========================================================
    environment:
      flutter: 3.22.0
      xcode: 15.4
      ruby: 3.2.0
      cocoapods: 1.15.2
    
    # =========================================================
    # SCRIPTS
    # =========================================================
    scripts:
      # =========================================================
      # ENVIRONMENT VALIDATION
      # =========================================================
      - name: Validate Build Environment
        script: |
          set -e
          echo "✓ Validating toolchain..."
          
          command -v flutter >/dev/null 2>&1 || { echo "❌ Flutter missing"; exit 1; }
          command -v pod >/dev/null 2>&1 || { echo "❌ CocoaPods missing"; exit 1; }
          
          flutter --version
          xcodebuild -version
          
          echo "✓ Environment ready"
      
      - name: Initialize & Cache Dependencies
        script: |
          set -e
          
          echo "📦 Installing dependencies..."
          flutter clean
          flutter pub get --no-example
          
          if [ -d "ios" ]; then
            echo "📱 Installing CocoaPods..."
            cd ios
            pod install --repo-update --silent
            cd ..
          fi
          
          echo "✓ Dependencies ready"
      
      # =========================================================
      # QUALITY ASSURANCE
      # =========================================================
      - name: Static Code Analysis
        script: |
          set -e
          
          echo "🔍 Running Flutter analyzer..."
          flutter analyze --fatal-infos --fatal-warnings
          
          echo "✓ Code analysis passed"
      
      - name: Unit & Widget Tests
        script: |
          set -e
          
          echo "🧪 Running test suite..."
          flutter test --coverage --test-randomize-ordering-seed=random
          
          echo "✓ All tests passed"
      
      - name: Coverage Report
        script: |
          set -e
          
          if [ -f "coverage/lcov.info" ]; then
            echo "📊 Test coverage generated"
          fi
      
      # =========================================================
      # RELEASE STRATEGY
      # =========================================================
      - name: Determine Deployment Strategy
        script: |
          set -e
          
          BRANCH="${CM_BRANCH:-${CM_TAG}}"
          echo "📍 Source: $BRANCH"
          
          if [[ "$BRANCH" == v* ]] || [[ "${CM_TAG}" != "" ]]; then
            BUILD_MODE="production"
            echo "🏷️ Release tag build"
          elif [[ "$BRANCH" == hotfix/* ]]; then
            BUILD_MODE="production"
            echo "🚑 Hotfix build"
          elif [[ "$BRANCH" == release/* ]]; then
            BUILD_MODE="production"
            echo "📦 Release candidate build"
          elif [[ "$BRANCH" == "main" ]]; then
            BUILD_MODE="production"
            echo "🎯 Main branch build"
          elif [[ "$BRANCH" == "develop" ]]; then
            BUILD_MODE="development"
            echo "🧪 Development build"
          else
            BUILD_MODE="debug"
            echo "🔧 Feature branch build"
          fi
          
          echo "BUILD_MODE=$BUILD_MODE" >> $CM_ENV
          echo "✅ Mode: $BUILD_MODE"
      
      # =========================================================
      # VERSION MANAGEMENT
      # =========================================================
      - name: Apply Semantic Versioning
        script: |
          set -e
          
          BASE_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD_NUMBER="${BUILD_NUMBER:-$(date +%Y%m%d%H%M)}"
          FULL_VERSION="${BASE_VERSION}+${BUILD_NUMBER}"
          
          echo "📌 Version: $FULL_VERSION"
          
          sed -i '' "s/version: .*/version: $FULL_VERSION/" pubspec.yaml
          
          if [ -d "ios" ]; then
            cd ios
            agvtool new-marketing-version "$BASE_VERSION" || true
            agvtool new-version -all "$BUILD_NUMBER" || true
            cd ..
          fi
          
          echo "VERSION=$FULL_VERSION" >> $CM_ENV
      
      # =========================================================
      # BUILD EXECUTION
      # =========================================================
      - name: Build iOS Application
        script: |
          set -e
          
          echo "🔨 Building iOS ($BUILD_MODE)..."
          
          case "$BUILD_MODE" in
            production)
              flutter build ipa \
                --release \
                --build-number="$BUILD_NUMBER" \
                --dart-define=ENV=production
              ;;
            development)
              flutter build ios \
                --debug \
                --no-codesign
              ;;
            debug)
              flutter build ios \
                --debug \
                --no-codesign
              ;;
          esac
          
          echo "✅ Build complete"
      
      - name: Validate Build Artifacts
        script: |
          set -e
          
          if [ "$BUILD_MODE" = "production" ]; then
            if [ ! -f "build/ios/ipa/*.ipa" ]; then
              echo "❌ IPA file not generated"
              exit 1
            fi
            echo "✅ IPA ready for distribution"
          else
            if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
              echo "❌ .app bundle not generated"
              exit 1
            fi
            echo "✅ .app bundle ready"
          fi
    
    # =========================================================
    # ROOT-LEVEL ARTIFACTS
    # =========================================================
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app
      - coverage/lcov.info
      - build/coverage/html/
    
    # =========================================================
    # ROOT-LEVEL PUBLISHING
    # =========================================================
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
          - QA Team
        skip_wait_for_build_processing: false
      
      slack:
        channel: '#ci-cd'
        notify_on_build_start: true
        notify_on_success: true
        notify_on_failure: true
      
      email:
        recipients:
          - engineering@tiligo.com
        notify_on_success: false
        notify_on_failure: true
