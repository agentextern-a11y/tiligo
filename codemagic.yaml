workflows:
  tiligo_ios:
    name: Tiligo iOS Production Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # VALIDATION
      # =========================================================
      - name: Validate Project
        script: |
          set -e
          echo "Checking project structure..."

          ls

          test -f pubspec.yaml || (echo "Missing pubspec.yaml" && exit 1)
          test -d ios || (echo "Missing ios folder" && exit 1)

      # =========================================================
      # FLUTTER SETUP
      # =========================================================
      - name: Flutter Dependencies
        script: |
          set -e
          flutter clean
          flutter pub get

      # =========================================================
      # COCOAPODS (HARD FIX)
      # =========================================================
      - name: Install CocoaPods
        script: |
          set -e

          echo "Ensuring CocoaPods is installed..."

          if ! command -v pod >/dev/null 2>&1; then
            echo "Installing CocoaPods..."
            sudo gem install cocoapods --no-document
          fi

          pod --version

      # =========================================================
      # IOS POD INSTALL
      # =========================================================
      - name: Install iOS Pods
        script: |
          set -e

          cd ios
          pod repo update
          pod install
          cd ..

      # =========================================================
      # TESTS (non-blocking)
      # =========================================================
      - name: Run Tests
        script: |
          set +e
          flutter test

      # =========================================================
      # ANALYSIS (non-blocking)
      # =========================================================
      - name: Static Analysis
        script: |
          set +e
          flutter analyze

      # =========================================================
      # IPA BUILD
      # =========================================================
      - name: Build iOS IPA
        script: |
          set -e

          flutter clean
          flutter pub get

          cd ios
          pod install
          cd ..

          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
        submit_to_app_store: false
