workflows:

  tiligo_smart_pipeline:
    name: Tiligo Enterprise CI/CD Pipeline

    integrations:
      app_store_connect: tiligo_asc

    max_build_duration: 120

    environment:
      flutter: stable
      xcode: latest

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle
        - ios/Pods

    scripts:

      # =========================================================
      # ENVIRONMENT INITIALIZATION
      # =========================================================
      - name: Initialize Build Environment
        script: |
          set -e

          echo "Initializing Flutter environment..."

          flutter clean
          flutter pub get

          echo "Installing CocoaPods dependencies..."

          cd ios
          pod install
          cd ..

      # =========================================================
      # QUALITY ASSURANCE
      # =========================================================
      - name: Execute Automated Tests
        script: |
          set +e

          echo "Running Flutter test suite..."

          flutter test

      - name: Perform Static Code Analysis
        script: |
          set +e

          echo "Analyzing project source code..."

          flutter analyze

      # =========================================================
      # RELEASE STRATEGY DETECTION
      # =========================================================
      - name: Determine Deployment Mode
        script: |
          set -e

          echo "Current branch: $CM_BRANCH"

          if [ "$CM_BRANCH" = "develop" ]; then
            echo "BUILD_MODE=development" >> $CM_ENV

          elif [ "$CM_BRANCH" = "main" ]; then
            echo "BUILD_MODE=production" >> $CM_ENV

          elif [[ "$CM_BRANCH" == v* ]]; then
            echo "BUILD_MODE=release" >> $CM_ENV

          else
            echo "BUILD_MODE=development" >> $CM_ENV
          fi

          echo "Resolved build mode: $BUILD_MODE"

      # =========================================================
      # APPLICATION BUILD PROCESS
      # =========================================================
      - name: Build iOS Application
        script: |
          set -e

          echo "Starting iOS build pipeline..."

          if [ "$BUILD_MODE" = "development" ]; then

            echo "Generating development build..."

            flutter build ios --debug --no-codesign

          else

            echo "Generating signed release IPA..."

            flutter build ipa --release

          fi

      # =========================================================
      # AUTOMATED VERSION MANAGEMENT
      # =========================================================
      - name: Apply Automated Build Versioning
        script: |
          set +e

          echo "Applying build number: $BUILD_NUMBER"

          cd ios
          agvtool new-version -all $BUILD_NUMBER || true
          cd ..

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app

    publishing:

      app_store_connect:

        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        submit_to_app_store: false
